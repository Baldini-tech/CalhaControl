<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CalhaControl - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU LATERAL -->
        
    <div class="sidebar">
           
        <div>
            <img src="/CalhaControl/img/calhacontrol_transparente.png" class="logo">
        </div>
        <footer class="footer">
            <p>© 2026 CalhaControl.</p>
        </footer>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="orcamentos.html">Orçamentos</a></li>
            <li><a href="servicos.html">Serviços</a></li>
        </ul>
    </div>

    

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main">
        <header>
            <h1>Dashboard</h1>
        </header>

        <!-- CARDS -->
        <div class="cards">
                
            <div class="card">
                <h3>Clientes</h3>
                <p id="totalClientes">0</p>
            </div>

            <div class="card">
                <h3>Orçamentos</h3>
                <p id="totalOrcamentos">0</p>
            </div>

            <div class="card">
                <h3>Serviços</h3>
                <p id="totalServicos">0</p>
            </div>
        </div>

        <!-- TABELA RECENTE -->
        <div class="tabela">
            <h2>Últimos Serviços</h2>
            <table>
                
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Serviço</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="listaServicos">
                    <!-- Dados virão do JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    
    <footer class="footer">
        <p>© 2026 CalhaControl. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
