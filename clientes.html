<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<title>Clientes - CalhaControl</title>
		<link rel="stylesheet" href="style.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
		/>
	</head>
	<body>
		<!-- SIDEBAR -->
		<div class="sidebar">
			<div>
				<img src="img/calhacontrol_transparente.png" class="logo" />
			</div>
			<footer class="footer">
				<p>™ 2026 CalhaControl.</p>
			</footer>

			<ul>
				<li>
					<a href="index.html"
						><i class="fa-solid fa-chart-line"></i>Dashboard</a
					>
				</li>
				<li>
					<a href="clientes.html" class="active"
						><i class="fa-solid fa-users"></i>Clientes</a
					>
				</li>
				<li>
					<a href="orcamentos.html "
						><i class="fa-solid fa-file-invoice"></i>Orçamentos</a
					>
				</li>
				<li>
					<a href="servicos.html"
						><i class="fa-solid fa-screwdriver-wrench"></i>Serviços</a
					>
				</li>
			</ul>
		</div>

		<!-- MAIN -->
		<div class="main">
			<h1>Clientes</h1>

			<!-- FORMULÁRIO -->
			<div class="card">
				<h3>Novo Cliente</h3>
				<input type="text" id="nome" placeholder="Nome" />
				<input type="text" id="telefone" placeholder="Telefone" />
				<input type="text" id="endereco" placeholder="Endereço" />
				<button onclick="cadastrarCliente()">Cadastrar</button>
			</div>

			<!-- LISTA -->
			<div class="tabela">
				<h2>Lista de Clientes</h2>
				<table id="tabelaClientes">
					<thead>
						<tr>
							<th>Nome</th>
							<th>Telefone</th>
							<th>Endereço</th>
							<th>Ações</th>
						</tr>
					</thead>
					<tbody id="listaClientes"></tbody>
				</table>
			</div>
		</div>

		<script src="clientes.js"></script>

		<!-- MODAL HISTÓRICO -->
		<div
			id="modalHistorico"
			style="
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.5);
				z-index: 999;
			"
		>
			<div
				style="
					background: white;
					margin: 5% auto;
					padding: 30px;
					border-radius: 10px;
					width: 60%;
					max-height: 80vh;
					overflow-y: auto;
				"
			>
				<h2 id="tituloHistorico"></h2>

				<h3>Orçamentos</h3>
				<table class="tabelaHistOrc">
					<thead>
						<tr>
							<th>Total</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody id="historicoOrcamentos"></tbody>
				</table>

				<h3 style="margin-top: 20px">Serviços</h3>
				<table class="tabelaHistServ">
					<thead>
						<tr>
							<th>Descrição</th>
							<th>Data</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody id="historicoServicos"></tbody>
				</table>

				<button onclick="fecharHistorico()" style="margin-top: 20px">
					Fechar
				</button>
			</div>
		</div>
	</body>
</html>
