<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<title>CalhaControl - Dashboard</title>
		<link rel="stylesheet" href="style.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
		/>
	</head>
	<body>
		<!-- MENU LATERAL -->

		<div class="sidebar">
			<div>
				<img src="img/calhacontrol_transparente.png" class="logo" />
			</div>
			<footer class="footer">
				<p>™ 2026 CalhaControl.</p>
			</footer>
			<ul>
				<li>
					<a href="index.html" class="active"
						><i class="fa-solid fa-chart-line"></i>Dashboard</a
					>
				</li>
				<li>
					<a href="clientes.html"><i class="fa-solid fa-users"></i>Clientes</a>
				</li>
				<li>
					<a href="orcamentos.html"
						><i class="fa-solid fa-file-invoice"></i>Orçamentos</a
					>
				</li>
				<li>
					<a href="servicos.html"
						><i class="fa-solid fa-screwdriver-wrench"></i>Serviços</a
					>
				</li>
				<li>
					<a href="financeiro.html"
						><i class="fa-solid fa-dollar-sign"></i>Financeiro</a
					>
				</li>
			</ul>
		</div>

		<!-- CONTEÚDO PRINCIPAL -->
		<div class="main">
			<header>
				<h1>Dashboard</h1>
			</header>
			<button id="darkToggle" title="Alternar modo escuro">
				<i class="fa-solid fa-moon"></i>
			</button>

			<!-- CARDS -->
			<div class="cards">
				<div class="card">
					<h3>Clientes</h3>
					<p id="totalClientes">0</p>
				</div>

				<div class="card">
					<h3>Orçamentos</h3>
					<p id="totalOrcamentos">0</p>
				</div>

				<div class="card">
					<h3>Serviços</h3>
					<p id="totalServicos">0</p>
				</div>

				<div class="card saldo-pendente">
					<h3><i class="fa-solid fa-clock"></i> Saldo Pendente</h3>
					<p id="saldoPendente">R$ 0,00</p>
				</div>

				<div class="card saldo-positivo">
					<h3><i class="fa-solid fa-check-circle"></i> Saldo Positivo</h3>
					<p id="saldoPositivo">R$ 0,00</p>
				</div>
			</div>

			<!-- TABELA RECENTE -->
			<div class="tabela">
				<h2>Últimos Serviços</h2>
				<table id="tabelaDeshboard">
					<thead>
						<tr>
							<th>Cliente</th>
							<th>Serviço</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody id="listaServicos">
						<!-- Dados virão do JavaScript -->
					</tbody>
				</table>
			</div>
		</div>

		<script src="script.js"></script>
		<script src="darkmode.js"></script>
	</body>
</html>
