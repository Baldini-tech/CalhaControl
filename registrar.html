<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<title>Login - CalhaControl</title>
		<link rel="stylesheet" href="css/registrar.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
		/>
	</head>
	<body>
		<div class="register-container">
			<div class="register-box">
				<div class="logo-register">
					<img src="img/calhacontrol_transparente.png" alt="CalhaControl" />
				</div>
				<h1>Cadastro</h1>
				<div class="from-content">
					<div class="dados-empresa">
						<h1>Dados da Empresa</h1>
						<input
							type="text"
							id="nomeEmpresa"
							placeholder="*Nome da empresa"
							required
						/>
						<input
							type="text"
							id="nomeFantasia"
							placeholder="*Nome fantasia"
							required
						/>
						<input type="text" id="cnpj" placeholder="*CNPJ" required />
						<input
							type="text"
							id="inscricaoEstadual"
							placeholder="*Inscrição Estadual"
							required
						/>
					</div>
					<div class="contato">
						<h1>Contato</h1>
						<input
							type="text"
							id="telefoneFixo"
							placeholder="*Telefone Fixo"
							required
						/>
						<input type="text" id="whatsApp" placeholder="*WhatsApp" required />
						<input type="text" id="email" placeholder="Email" />
					</div>
					<div class="endereco">
						<h1>Endereço</h1>
						<input type="text" id="cep" placeholder="*CEP" required />
						<input type="text" id="rua" placeholder="*Rua" required />
						<input type="text" id="numero" placeholder="*Número" required />
						<input type="text" id="bairro" placeholder="*Bairro" required />
						<input type="text" id="cidade" placeholder="*Cidade" required />
						<input type="text" id="estado" placeholder="*Estado" required />
						<input type="text" id="complemento" placeholder="Complemento" />
					</div>
					<div class="loginSistema">
						<input
							type="password"
							id="senhaConta"
							placeholder="*Senha"
							required
						/>
						<input
							type="password"
							id="repetirSenhaConta"
							placeholder="*Repetir Senha"
							required
						/>
					</div>
				</div>
				<div class="button-area">
					<div class="register-btn">
						<button onclick="cadastrar()">
							<i class="fa-regular fa-circle-check"></i> Cadastrar
						</button>
					</div>
					<div class="cancel-btn">
						<button onclick="cancelar()">
							<i class="fa-regular fa-circle-xmark"></i> Cancelar
						</button>
					</div>
				</div>
			</div>
		</div>
		<script src="registrar.js"></script>
	</body>
</html>
